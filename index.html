<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Research shows that… — a lesser-known study, daily</title>
  <meta name="description" content="One lesser-known peer-reviewed study, summarized in a 3-minute read. New every day, with links to fact-check." />

  <!-- PWA: installable on iOS & Android home screens -->
  <link rel="manifest" href="manifest.webmanifest" />
  <meta name="theme-color" content="#faf9f7" media="(prefers-color-scheme: light)" />
  <meta name="theme-color" content="#16150f" media="(prefers-color-scheme: dark)" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="Research" />
  <link rel="apple-touch-icon" href="icons/apple-touch-icon.png" />
  <link rel="icon" type="image/png" sizes="32x32" href="icons/favicon-32.png" />
  <link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png" />

  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="site-header">
    <a class="brand" href="./">Research shows that<span class="brand-dots">…</span></a>
    <button id="theme-toggle" class="icon-btn" type="button" aria-label="Toggle dark mode" title="Toggle theme">
      <span class="theme-icon" aria-hidden="true"></span>
    </button>
  </header>

  <div class="countdown" id="countdown" role="timer" aria-label="Time until the next research refresh">
    <span class="cd-dot" aria-hidden="true"></span>
    <span class="cd-label">Next study in</span>
    <span class="cd-time" id="cd-time">--:--:--</span>
  </div>

  <main id="main">
    <article id="article" class="article" aria-busy="true">
      <div class="loading">Loading today's research…</div>
    </article>
  </main>

  <footer class="site-footer">
    <p>
      One lesser-known, peer-reviewed study each day. Summaries are generated from the
      paper's own abstract — always read the source before you cite it.
    </p>
    <p class="credit">Study metadata &amp; links via <a href="https://openalex.org" target="_blank" rel="noopener">OpenAlex</a>.</p>
  </footer>

  <div id="toast" class="toast" role="status" aria-live="polite" hidden></div>

  <script src="app.js"></script>
</body>
</html>
