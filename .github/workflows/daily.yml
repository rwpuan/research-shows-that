name: Publish daily research

on:
  schedule:
    - cron: "0 16 * * *"  # 16:00 UTC = 00:00 Singapore time (UTC+8); GitHub may delay a few min
  workflow_dispatch:        # manual "Run workflow" button
    inputs:
      date:
        description: "Generate for a specific date (YYYY-MM-DD). Leave blank for today."
        required: false
        default: ""

permissions:
  contents: write   # commit the new content file
  pages: write      # deploy to Pages
  id-token: write

concurrency:
  group: daily-research
  cancel-in-progress: false

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install generator deps
        working-directory: scripts
        run: npm ci || npm install

      - name: Generate today's entry (best-effort)
        continue-on-error: true
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENALEX_MAILTO: ${{ secrets.OPENALEX_MAILTO }}
          DATE: ${{ inputs.date }}
        run: |
          if [ -z "$ANTHROPIC_API_KEY" ]; then
            echo "No ANTHROPIC_API_KEY set yet — skipping generation and deploying existing content."
            exit 0
          fi
          node scripts/generate.mjs

      - name: Commit new content
        run: |
          git config user.name "research-daily-bot"
          git config user.email "actions@github.com"
          if [ -n "$(git status --porcelain content)" ]; then
            git add content
            git commit -m "content: daily research for $(date -u +%F)"
            git push
          else
            echo "No content changes to commit."
          fi

      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .   # static site is the repo root

  deploy:
    needs: generate
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
